name: Package Downloads

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  install:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['18', '20', '22']
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install @greyw0rks/clarity-vote
        run: npm install @greyw0rks/clarity-vote
      - name: Install @greyw0rks/vault-escrow
        run: npm install @greyw0rks/vault-escrow
      - name: Verify clarity-vote exports
        run: node -e "import('@greyw0rks/clarity-vote').then(m => { if (!m.CONTRACTS) throw new Error('missing CONTRACTS'); console.log('clarity-vote OK'); })"
      - name: Verify vault-escrow exports
        run: node -e "import('@greyw0rks/vault-escrow').then(m => { if (!m.CONTRACTS) throw new Error('missing CONTRACTS'); console.log('vault-escrow OK'); })"
